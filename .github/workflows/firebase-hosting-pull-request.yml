# .github/workflows/firebase-hosting-pull-request.yml
name: Deploy to Firebase Hosting on PR

on: 
  pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 1️⃣ Checkout du code
      - uses: actions/checkout@v4

      # 2️⃣ Installer Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.1'  # Met la version Flutter que tu utilises

      # 3️⃣ Installer les dépendances Flutter
      - run: flutter pub get

      # 4️⃣ Build web Flutter
      - run: flutter build web --release

      # 5️⃣ Déployer sur Firebase Hosting (preview channel)
      - uses: FirebaseExtended/action-hosting-deploy@v1
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GUESSNUMBERGAME_6F0FF }}
          projectId: guessnumbergame-6f0ff
          channelId: pr-${{ github.event.pull_request.number }}
