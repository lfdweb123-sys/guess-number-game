# .github/workflows/firebase-hosting-merge.yml
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # option pour Node.js 24
    steps:
      # 1️⃣ Récupérer le code
      - uses: actions/checkout@v4

      # 2️⃣ Installer Flutter
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.1'  # Remplace par ta version Flutter si besoin

      # 3️⃣ Installer les dépendances Flutter
      - run: flutter pub get

      # 4️⃣ Build le projet web
      - run: flutter build web --release

      # 5️⃣ Déployer sur Firebase Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v1
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GUESSNUMBERGAME_6F0FF }}
          channelId: live
          projectId: guessnumbergame-6f0ff
